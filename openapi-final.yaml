            "maxLength": 255,
            "minLength": 1,
            "title": "Expected Logic",
            "description": "埋伏预期逻辑"
          },
          "add_date": {
            "anyOf": [
              {
                "type": "string",
                "pattern": "^\\d{8}$"
              },
              {
                "type": "null"
              }
            ],
            "title": "Add Date",
            "description": "调入日期，格式YYYYMMDD"
          },
          "status": {
            "type": "integer",
            "title": "Status",
            "description": "状态：1=监控中, 0=已爆发调出, -1=逻辑证伪剔除",
            "default": 1
          }
        },
        "type": "object",
        "required": [
          "ts_code",
          "expected_logic"
        ],
        "title": "AmbushPoolCreate"
